name: vanilla-jobs
services:
  web:
    container_name: vanilla-jobs-web
    image: nginx:latest
    ports:
      - 8000:80
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    links:
      - php-fpm
    depends_on:
      - db

  php-fpm:
    container_name: vanilla-jobs-php
    image: php:8.5.4-fpm
    build: .
    volumes:
      - ./:/var/www/html

  db:
    container_name: vanilla-jobs-db
    image: mariadb:10.11.16
    ports:
      - 3306:3306
    environment:
      MARIADB_ROOT_PASSWORD: root_pass
      MARIADB_DATABASE: vanilla_jobs
      MARIADB_USER: vanilla_jobs_user
      MARIADB_PASSWORD: password123
    volumes:
      - ./docker/db:/docker-entrypoint-initdb.d